name: visual

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
  SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
  NEXT_PUBLIC_APP_URL: http://127.0.0.1:45999
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_000000000000000000000000
  STRIPE_SECRET_KEY: sk_test_000000000000000000000000
  STRIPE_WEBHOOK_SECRET: whsec_test
  OPENROUTER_API_KEY: test-openrouter
  TELEGRAM_WEBHOOK_SECRET: test-telegram-webhook
  CRON_SECRET: test-cron-secret

jobs:
  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Run visual regression
        run: npm run test:visual

      - name: Upload visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-artifacts-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7
