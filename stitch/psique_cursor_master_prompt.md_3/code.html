<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PSIQUE - Clinical Session</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&amp;family=Instrument+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --bg: #080f0b;
            --bg2: #0c1510;
            --card: #121a14;
            --border: #1c2e20;
            --mint: #52b788;
            --mintl: #74c9a0;
            --gold: #c4a35a;
            --ivory: #ede7d9;
            --ivoryD: #c8bfa8;
            --ivoryDD: #8a8070;
            --red: #b85450;
            --blue: #4a8fa8;
        }
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Instrument Sans', sans-serif;
        }
        .font-serif {
            font-family: 'Cormorant Garamond', serif;
        }
        .glow-mint {
            box-shadow: 0 0 15px rgba(82, 183, 136, 0.15);
        }
        .glow-red {
            box-shadow: 0 0 20px rgba(184, 84, 80, 0.25);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body>
<div class="w-[390px] h-[844px] bg-[var(--bg)] relative overflow-hidden rounded-[40px] border-[8px] border-[#111] shadow-2xl flex flex-col">
<div class="absolute inset-0 z-0">
<img alt="Patient Video" class="w-full h-full object-cover opacity-70 mix-blend-luminosity brightness-110" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC1zdq9Q_q60f0--6CGjfGb9sjL2HqY0tSZ_Aox_Slq7WdU03aYBUswxSoFOxikmudQhLMEIgAI3F1Z8U7VemuZKM7YW8ocXCXP9sU1ZN2swtZU1oCKoqYdQdSYuosUiuRGEjEK1FeFKdVDpMt7LtoMvfCDwNZEzBkGJuRbjSkN4V2brBUzKdKy7hwXXHNi1YC-X8OFfgW-h32RhW4if9NrFo0hwlPwZirYEtHF8ZE0ysfVkTssKtxPSPpUX8XxVoGM8nj_tedh3LG2"/>
<div class="absolute inset-0 bg-gradient-to-b from-[var(--bg)]/80 via-transparent to-[var(--bg)]/90"></div>
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_0%,var(--bg)_100%)] opacity-40"></div>
</div>
<div class="absolute top-0 w-full px-6 pt-12 pb-4 flex justify-between items-center z-10">
<div class="flex items-center gap-2 bg-[var(--card)]/60 backdrop-blur-md px-3 py-1.5 rounded-full border border-[var(--border)]">
<div class="w-2 h-2 rounded-full bg-[var(--mint)] animate-pulse shadow-[0_0_8px_var(--mint)]"></div>
<span class="text-xs font-medium tracking-widest text-[var(--mintl)]">45:12</span>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[var(--ivoryDD)] text-sm">signal_cellular_alt</span>
<div class="bg-[var(--card)]/60 backdrop-blur-md p-1.5 rounded-full border border-[var(--border)]">
<span class="material-symbols-outlined text-[var(--ivoryD)] text-xs block">lock</span>
</div>
</div>
</div>
<div class="absolute top-28 right-5 w-[100px] h-[140px] bg-[var(--card)] rounded-2xl overflow-hidden border border-[var(--border)] glow-mint z-10">
<img alt="Therapist View" class="w-full h-full object-cover opacity-90 sepia-[.2]" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCTXVuiRaulryg_SmzFpncbmqgdsL7_ANRKQ-cVrIkPs4ry2Co3x-2UFlCxy9RY__xjQsfM_Xl8vSbo2bp1fVmftgBbDosEMYoXwlOv2bVWv6oBH7lQCEv5R-y4iXSMtw_FypsOnpOyaPXU6q1CvSaeOewqluwkaYIgD7v1gTZV1vP6jpfp-3ZL170LuBdhbFWjD02Ju7M1EvkJhflHcekcLgJmMu4Q6DmaZ5P4rY3TGr8hQIVheEAsTJV1GG50GzqDPqRX6imIyfz2"/>
</div>
<div class="absolute bottom-0 w-full bg-[var(--bg2)]/95 backdrop-blur-2xl border-t border-[var(--border)] rounded-t-[32px] pt-3 pb-8 px-5 z-20 shadow-[0_-20px_50px_rgba(8,15,11,0.9)] transition-transform duration-500 transform translate-y-0">
<div class="w-10 h-1.5 bg-[var(--border)] rounded-full mx-auto mb-5"></div>
<div class="flex flex-col gap-5">
<div class="flex justify-between items-center px-1">
<div>
<h2 class="font-serif text-[var(--gold)] text-2xl tracking-wide leading-none">Clinical Intelligence</h2>
<p class="text-[var(--ivoryDD)] text-xs mt-1">Real-time analysis active</p>
</div>
<div class="w-8 h-8 rounded-full bg-[var(--card)] border border-[var(--border)] flex items-center justify-center">
<span class="material-symbols-outlined text-[var(--mint)] text-sm animate-pulse">auto_awesome</span>
</div>
</div>
<div class="relative group">
<textarea class="w-full h-28 bg-[var(--card)] border border-[var(--border)] rounded-2xl p-4 text-sm text-[var(--ivory)] placeholder-[var(--ivoryDD)] focus:outline-none focus:border-[var(--mint)]/40 focus:ring-1 focus:ring-[var(--mint)]/20 transition-all resize-none font-light leading-relaxed scrollbar-hide" placeholder="Capture clinical observations..."></textarea>
<div class="absolute bottom-3 right-4 flex items-center gap-1.5">
<div class="flex gap-0.5 h-2 items-center">
<div class="w-0.5 h-1 bg-[var(--mint)] rounded-full animate-[ping_1s_infinite_0ms]"></div>
<div class="w-0.5 h-2 bg-[var(--mint)] rounded-full animate-[ping_1s_infinite_200ms]"></div>
<div class="w-0.5 h-1 bg-[var(--mint)] rounded-full animate-[ping_1s_infinite_400ms]"></div>
</div>
<span class="text-[10px] text-[var(--ivoryDD)] uppercase tracking-wider font-medium">Listening</span>
</div>
</div>
<div class="flex gap-3 mt-1">
<button class="w-[52px] h-[52px] shrink-0 rounded-[18px] bg-[var(--card)] border border-[var(--border)] flex items-center justify-center text-[var(--ivory)] hover:bg-[#1a251d] transition-colors active:scale-95">
<span class="material-symbols-outlined">mic</span>
</button>
<button class="w-[52px] h-[52px] shrink-0 rounded-[18px] bg-[var(--card)] border border-[var(--border)] flex items-center justify-center text-[var(--ivory)] hover:bg-[#1a251d] transition-colors active:scale-95">
<span class="material-symbols-outlined">videocam</span>
</button>
<button class="flex-1 rounded-[18px] bg-gradient-to-br from-[var(--red)] to-[#8a3f3c] border border-[#d66a65]/30 text-white font-medium text-[15px] flex items-center justify-center gap-2 glow-red transition-all active:scale-95">
<span class="material-symbols-outlined text-[20px]">stop_circle</span>
                        End &amp; Generate Summary
                    </button>
</div>
</div>
</div>
<div class="absolute bottom-0 w-full h-8 z-30 pointer-events-none"></div>
</div>

</body></html>
